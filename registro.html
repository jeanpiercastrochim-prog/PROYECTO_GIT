<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - EduTech SENATI</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Sora', sans-serif;
    background: #0a0e1a; /* Fondo oscuro del proyecto */
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .register-container {
    background: #151d30;
    border: 1px solid #1e2d47;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 0 30px rgba(0,212,255,0.1);
  }
  .register-container h2 {
    text-align: center;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .register-container h2 span {
    color: #00d4ff; /* Celeste SENATI */
  }
  .subtitle {
    text-align: center;
    color: #94a3b8;
    font-size: 13px;
    margin-bottom: 24px;
  }
  .input-group {
    margin-bottom: 16px;
  }
  .input-group label {
    display: block;
    font-size: 12px;
    margin-bottom: 8px;
    color: #94a3b8;
  }
  .input-group input {
    width: 100%;
    padding: 12px;
    background: #0f1525;
    border: 1px solid #1e2d47;
    border-radius: 10px;
    color: #fff;
    font-family: 'Sora', sans-serif;
    box-sizing: border-box;
    transition: all 0.3s;
  }
  .input-group input:focus {
    outline: none;
    border-color: #00d4ff;
    box-shadow: 0 0 0 2px rgba(0,212,255,0.2);
  }
  .btn-submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #00d4ff, #7c3aed);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    margin-top: 10px;
    transition: opacity 0.3s, transform 0.2s;
  }
  .btn-submit:hover {
    opacity: 0.9;
    transform: translateY(-2px);
  }
  .credit {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: #64748b;
    border-top: 1px solid #1e2d47;
    padding-top: 16px;
  }
</style>
</head>
<body>

<div class="register-container">
  <h2>EduTech <span>SENATI</span></h2>
  <div class="subtitle">Crear cuenta de estudiante</div>
  
  <div class="input-group">
    <label>Nombre Completo</label>
    <input type="text" placeholder="Ej: Dayron Samir">
  </div>
  
  <div class="input-group">
    <label>ID / Correo Institucional</label>
    <input type="email" placeholder="usuario@senati.pe">
  </div>

  <div class="input-group">
    <label>Contraseña</label>
    <input type="password" placeholder="••••••••">
  </div>

  <button class="btn-submit">Completar Registro</button>

  <div class="credit">
    Módulo de registro desarrollado por Dayron Samir.<br>
    <em>Evidencia para informe de laboratorio.</em>
  </div>
</div>

</body>
</html>
